; /etc/xrdp/xrdp.ini — ConsoleRDP variant
;
; Auth flow (Windows-RDP-like):
;   1. mstsc / FreeRDP collects credentials from the user.
;   2. xrdp receives them in the RDP handshake and forwards to xrdp-sesman.
;   3. xrdp-sesman authenticates via PAM (/etc/pam.d/xrdp-sesman).
;      That stack runs our open_session hook → consolerdp-takeover.
;   4. xrdp-sesman picks a free RFB port + generates a per-session VNC
;      password, then exec()s "Xvnc" — which on this system is our
;      /usr/local/sbin/Xvnc shim that pipes x11vnc -display :0 to that
;      port with that password.
;   5. xrdp connects to localhost:<port> with the per-session password
;      and proxies the live :0 framebuffer to the client.
;
; Result: no second login screen. Same UX as Windows RDP.

[Globals]
ini_version=1
fork=true
port=3389
use_vsock=false
tcp_nodelay=true
tcp_keepalive=true
security_layer=negotiate
crypt_level=high
certificate=
key_file=
ssl_protocols=TLSv1.2, TLSv1.3
autorun=Console
; Hide the xrdp login dialog when the client supplied creds in the
; RDP handshake (mstsc with saved password, FreeRDP with /u /p, etc.):
enable_token_login=true
allow_channels=true
allow_multimon=true
bitmap_cache=true
bitmap_compression=true
bulk_compression=true
max_bpp=32
new_cursors=true
use_fastpath=both
; require_credentials must NOT be true — it forces the client to pre-fill
; the password inside the RDP handshake itself, which most clients only
; do if a saved credential is configured. PAM already enforces auth.
require_credentials=false
hidelogwindow=true
ls_top_window_bg_color=003366

[Logging]
LogFile=/var/log/xrdp.log
LogLevel=INFO
EnableSyslog=true

[Channels]
rdpdr=true
rdpsnd=true
drdynvc=true
cliprdr=true
rail=false
xrdpvr=false

; Sole exposed session type. lib=libvnc.so + port=-1 means "ask sesman
; to allocate a port and start a backend on it". sesman runs our shim
; which redirects the VNC stream to the live :0.
[Console]
name=Console
lib=libvnc.so
username=ask
password=ask
; port=-1 + no ip= → ask sesman to allocate a port and start a backend.
; sesman invokes our /usr/local/sbin/Xvnc shim which serves :0 via x11vnc.
port=-1
chansrvport=DISABLED
