# /etc/consolerdp/consolerdp.conf
# Generated by ConsoleRDP installer. Edit and `systemctl restart consolerdp`.

[seat]
# The single user permitted to own this seat.
user = REPLACE_ME

# TTY where the live X session lives. SDDM on Kubuntu 24.04+ uses tty1.
console_tty = 1

# TTY shown to the displaced side (must be different from console_tty).
greeter_tty = 8

# Path to the x11vnc password file.
vnc_passwd_file = /etc/consolerdp/vnc.passwd

[bridge]
# Legacy x11vnc bridge config — retained for backwards compatibility
# with v1 (xrdp+sesman) installs. Ignored by the freerdp-shadow-cli
# stack but the field still has to parse.
listen = 127.0.0.1
port   = 5900

[rdp]
# TCP port that freerdp-shadow-cli listens on. consolerdp-daemon
# polls /proc/net/tcp{,6} for ESTABLISHED sockets bound to this port
# to drive automatic takeover/release. Change here AND in
# /etc/default/consolerdp-rdp (CONSOLERDP_RDP_PORT) if you move it.
port = 3389

# How often the watcher polls for connection-state changes, seconds.
# 0.5s is fast enough that the local screen blanks before the user
# has finished entering credentials in mstsc.
watch_interval = 0.5

[policy]
single_rdp = true
lock_on_release = true
