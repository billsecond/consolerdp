; /etc/xrdp/sesman.ini — ConsoleRDP variant
;
; We do NOT spawn an Xorg/Xvnc backend. The user's :0 is already
; running and is proxied via x11vnc. Therefore most of the [Xorg],
; [Xvnc], [Chansrv] sections are intentionally omitted/disabled.

[Globals]
ListenAddress=127.0.0.1
ListenPort=3350
; Critical: ConsoleRDP needs the "WM" to be a no-op placeholder. The
; user's REAL desktop is already running on :0; we proxy it via
; x11vnc. Stock /etc/xrdp/startwm.sh would try to spawn a *second*
; full Plasma session on the 1×1 Xvfb decoy at :10 and immediately
; die, which would cause sesman to tear the RDP session down and
; the mstsc form would "restart". consolerdp-startwm just blocks
; until the decoy X server dies, which only happens after the RDP
; client disconnects.
EnableUserWindowManager=false
UserWindowManager=/usr/local/sbin/consolerdp-startwm
DefaultWindowManager=/usr/local/sbin/consolerdp-startwm
ReconnectScript=/usr/local/sbin/consolerdp-startwm

[Security]
AllowRootLogin=false
MaxLoginRetry=3
TerminalServerUsers=tsusers
TerminalServerAdmins=tsadmins
AlwaysGroupCheck=false

[Sessions]
X11DisplayOffset=10
MaxSessions=1
KillDisconnected=true
DisconnectedTimeLimit=0
IdleTimeLimit=0
Policy=Default

[Logging]
LogFile=/var/log/xrdp-sesman.log
LogLevel=INFO
EnableSyslog=true

; xrdp-sesman runs the binary named by the FIRST `param=` line and
; appends the rest as argv. **MUST be an absolute path**: sesexec
; setuids to the seat user before exec(), and Linux's PAM-cleansed
; user PATH does not include /usr/local/sbin (root's does, the user's
; does not — see /etc/login.defs ENV_PATH vs ENV_SUPATH).
;
; /usr/local/sbin/Xvnc is a symlink to consolerdp-xvnc-shim installed
; by the ConsoleRDP installer.
[Xvnc]
param=/usr/local/sbin/Xvnc
param=-bs
param=-nolisten
param=tcp
param=-localhost
param=-dpi
param=96
