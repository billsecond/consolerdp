# /etc/consolerdp/consolerdp.conf
# Generated by ConsoleRDP installer. Edit and `systemctl restart consolerdp`.

[seat]
# The single user permitted to own this seat.
user = REPLACE_ME

# TTY where the live X session lives. SDDM on Kubuntu 24.04+ uses tty1.
console_tty = 1

# TTY shown to the displaced side (must be different from console_tty).
greeter_tty = 8

# Path to the x11vnc password file.
vnc_passwd_file = /etc/consolerdp/vnc.passwd

[bridge]
listen = 127.0.0.1
port   = 5900

[policy]
single_rdp = true
lock_on_release = true
